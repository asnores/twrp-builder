name: Recovery Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php
        sudo apt-get clean
        
    - name: Install Build Dependencies & Repo Tool
      run: |
        sudo apt-get update
        # Idinagdag ang 'repo' direktang package para hindi na mag-download gamit ang curl
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 repo

    - name: Initialize Fox/TWRP Source Sync
      run: |
        mkdir ~/fox && cd ~/fox
        git config --global user.name "Builder"
        git config --global user.email "builder@email.com"
        
        # Gumamit ng opisyal na manifest setup ng OrangeFox Project
        repo init --depth=1 -u https://gitlab.com -b fox_12.1 --no-clone-bundle
        
        # Safe parallel syncing para sa Tecno Camon 20 Pro tree compilation
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags || repo sync -c -j2 --force-sync --no-clone-bundle --no-tags

    - name: Clone Your Device Tree
      run: |
        mkdir -p ~/fox/device/tecno/TECNO-CK7n
        git clone https://github.com -b fox_12.1 ~/fox/device/tecno/TECNO-CK7n

    - name: Start Building Recovery Image
      run: |
        cd ~/fox
        . build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_TECNO-CK7n-eng || lunch omni_TECNO-CK7n-eng
        mka recoveryimage -j$(nproc)

    - name: Upload Finished TWRP File
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_Recovery_Tecno_Camon_20_Pro
        path: ~/fox/out/target/product/TECNO-CK7n/OrangeFox*.img
