name: Recovery Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Clean Environment
      run: |
        sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php
        sudo apt-get clean
        
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        # INAYOS: Ginamit ang opisyal na raw GitHub source bootstrap link ng Google Repo team
        curl https://githubusercontent.com > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH=~/bin:$PATH

    - name: Initialize Fox/TWRP Source Sync
      run: |
        export PATH=~/bin:$PATH
        mkdir ~/fox && cd ~/fox
        git config --global user.name "Builder"
        git config --global user.email "builder@email.com"
        repo init --depth=1 -u https://gitlab.com -b fox_12.1
        repo sync -j$(nproc) --force-sync

    - name: Clone Your Device Tree
      run: |
        mkdir -p ~/fox/device/tecno/TECNO-CK7n
        git clone https://github.com -b fox_12.1 ~/fox/device/tecno/TECNO-CK7n

    - name: Start Building Recovery Image
      run: |
        export PATH=~/bin:$PATH
        cd ~/fox
        . build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_TECNO-CK7n-eng || lunch omni_TECNO-CK7n-eng
        mka recoveryimage -j$(nproc)

    - name: Upload Finished TWRP File
      uses: actions/upload-artifact@v4
      with:
        name: TWRP_Recovery_Tecno_Camon_20_Pro
        path: ~/fox/out/target/product/TECNO-CK&n/OrangeFox*.img
